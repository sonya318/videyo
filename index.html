<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#0f0f0f;
font-family:Arial;
color:#ffffff;
}

.header{
height:60px;
display:flex;
align-items:center;
padding:0 20px;
border-bottom:1px solid #222;
font-weight:bold;
color:#d405f0;
}

.layout{
max-width:1000px;
margin:auto;
padding:20px;
}

.player video{
width:100%;
border-radius:12px;
background:#000;
}

/* CHANNEL */
.main-channel{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:12px;
padding:12px;
background:#111;
border-radius:12px;
flex-wrap:wrap;
gap:10px;
}

.channel-left{
display:flex;
align-items:center;
gap:10px;
}

.channel-left img{
width:45px;
height:45px;
border-radius:50%;
}

.channel-info{
display:flex;
flex-direction:column;
}

.channel-name{
font-weight:bold;
font-size:15px;
}

.channel-actions{
display:flex;
gap:10px;
}

.btn-follow{
background:#00f7ff;
border:none;
padding:8px 14px;
border-radius:6px;
color:#ee0b0b;
font-weight:bold;
cursor:pointer;
}

.btn-join{
background:transparent;
border:1px solid #ffffff;
padding:8px 14px;
border-radius:6px;
color:#ff9900;
cursor:pointer;
}

/* RECOMMEND */
.recommend{
margin-top:20px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.item{
position:relative;
border-radius:10px;
overflow:hidden;
cursor:pointer;
background:#111;
}

.thumb{
width:100%;
aspect-ratio:16/9;
object-fit:cover;
}

/* PLAY ICON */
.play-icon{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:50px;
height:50px;
background:rgba(0,0,0,0.6);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:#fff;
transition:0.3s;
}

.item:hover .play-icon{
background:#e50914;
transform:translate(-50%,-50%) scale(1.1);
}

.channel{
padding:6px;
font-size:12px;
color:#aaa;
display:flex;
align-items:center;
gap:5px;
}

.channel img{
width:20px;
height:20px;
border-radius:50%;
}

.view-more{
margin-top:25px;
text-align:center;
cursor:pointer;
color:#aaa;
}

@media(max-width:700px){
.recommend{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<body>

<div class="header">ViDeoY ONLINE</div>

/* RENDER */
let visible = 6;

function render(){
  list.innerHTML="";
  videos.slice(0,visible).forEach(v=>{
    const div=document.createElement("div");
    div.className="item";
    div.innerHTML=`
      <img src="${v.thumb}" class="thumb">
      <div class="play-icon">▶</div>
      <div class="channel">
        <img src="${v.avatar}">
        ${v.author}
      </div>
    `;
    div.onclick=()=>location.search="?id="+v.id;
    list.appendChild(div);
  });
}

render();

function goMore(){
  visible+=6;

}
